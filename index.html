<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>War3 Viewer</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 2rem; background: #101218; color: #e6edf3; }
      a { color: #58a6ff; }
      .card { max-width: 720px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.2rem 1.4rem; }
      code { background: #0d1117; padding: 0.15rem 0.35rem; border-radius: 4px; }

  <body>
    <div class="card">

      <p>
        直接打开：
        <a href="/clients/map/index.html">/clients/map/index.html</a>

      <p>开发命令：<code>npm run dev</code></p>
    </div>
    <script>
      if (window.location.pathname === '/') {
        window.location.replace('/clients/map/index.html');
      }
    </script>

</html>
